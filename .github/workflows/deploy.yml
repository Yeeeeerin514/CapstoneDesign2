name: Deploy Spring Boot to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          cd Back/albasave-server
          chmod +x gradlew
          ./gradlew build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "Back/albasave-server/build/libs/albasave-server-0.0.1-SNAPSHOT.jar"
          target: "~/app/back/libs"
          strip_components: 4

      - name: Restart Spring Boot on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            sudo fuser -k 8080/tcp || true
            mkdir -p ~/app/back/libs
            cat > ~/app/back/.env <<EOF
            DB_URL=jdbc:postgresql://albasave-db.c5csm4aeqbg6.ap-northeast-2.rds.amazonaws.com:5432/albasave
            DB_USERNAME=postgres
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            AWS_S3_BUCKET=albasave-storage-new
            AWS_REGION=ap-northeast-2
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_MODEL=gpt-4o-mini
            LOCALDATA_CSV_DIR=/home/ubuntu/albasave-data
            EOF
            chmod 600 ~/app/back/.env
            cd ~/app/back
            set -a
            . ~/app/back/.env
            set +a
            nohup java -jar libs/albasave-server-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
