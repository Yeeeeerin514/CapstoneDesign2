name: Deploy Spring Boot to EC2

on:
  push:
    branches: [ "main" ] # main 브랜치에 푸시될 때 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. 프로젝트 빌드 (테스트는 제외하고 빌드 속도를 높임)
      - name: Build with Gradle
        run: |
          cd back/albasave-server
          chmod +x gradlew
          ./gradlew build -x test

      # 2. 빌드된 JAR 파일을 EC2로 전송 (SCP 사용)
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "back/albasave-server/build/libs/*.jar"
          target: "~/app/back"
          strip_components: 3 # 폴더 구조를 무시하고 jar 파일만 쏙 넣기

      # 3. EC2 서버에서 기존 서버 끄고 새 서버 실행하기
      - name: Execute Remote SSH commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 기존 8080 포트 프로세스 종료
            sudo fuser -k 8080/tcp || true
            
            # 이동 및 실행
            cd ~/app/back
            # 보안 키들을 환경 변수로 주입하며 실행 (중요!)
            nohup java -jar *.jar \
              --AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
              --AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
              > app.log 2>&1 &